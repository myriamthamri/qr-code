version: '3.8'

services:
  qr-code:
    image: registry.gitlab.com/myriamthamri/qr-code:latest
    container_name: qr-code-app
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3