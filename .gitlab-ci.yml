# ==========================================
# STAGES
# ==========================================
stages:
  - lint
  - test
  - build
  - deploy
  - smoke-test
# ==========================================
# GLOBAL VARIABLES
# ==========================================
variables:
  DOCKER_IMAGE_NAME: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG
  DOCKER_TLS_CERTDIR: "/certs"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

# ==========================================
# CACHE
# ==========================================
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .cache/pip
    - venv/

# ==========================================
# TEMPLATE: Python Jobs
# ==========================================
.python_job:
  image: python:3.11-slim
  before_script:
    - python -m venv venv
    - source venv/bin/activate
    - pip install --upgrade pip
    - pip install -r requirements.txt

# ==========================================
# STAGE 1: LINT
# ==========================================
lint:
  extends: .python_job
  stage: lint
  before_script:
    - python -m venv venv
    - source venv/bin/activate
    - pip install --upgrade pip
    - pip install -r requirements.txt
    - pip install flake8
  script:
    - flake8 . --max-line-length=100 --exclude=venv,__pycache__,.git --ignore=E302,W293,W292
  rules:
    - if: $CI_COMMIT_BRANCH

# ==========================================
# STAGE 2: TEST
# ==========================================
test:
  extends: .python_job
  stage: test
  before_script:
    - python -m venv venv
    - source venv/bin/activate
    - pip install --upgrade pip
    - pip install -r requirements.txt
    - pip install pytest pytest-cov
  script:
    - pytest --cov=. --cov-report=xml --cov-report=term-missing --cov-fail-under=80
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml
  rules:
    - if: $CI_COMMIT_BRANCH

# ==========================================
# STAGE 3: DOCKER BUILD
# ==========================================
docker-build:
  image: docker:cli
  stage: build
  services:
    - docker:dind
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
  script:
    - docker build --pull -t "$DOCKER_IMAGE_NAME" .
    - docker push "$DOCKER_IMAGE_NAME"
    - |
      if [[ "$CI_COMMIT_BRANCH" == "$CI_DEFAULT_BRANCH" ]]; then
        docker tag "$DOCKER_IMAGE_NAME" "$CI_REGISTRY_IMAGE:latest"
        docker push "$CI_REGISTRY_IMAGE:latest"
      fi
  rules:
    - if: $CI_COMMIT_BRANCH
      exists:
        - Dockerfile

# ==========================================
# STAGE 4: DEPLOY
# ==========================================
deploy:
  stage: deploy
  image: alpine:latest
  script:
    - echo "Livraison continue prête."
    - echo "Image Docker disponible dans le GitLab Container Registry:"
    - echo "$CI_REGISTRY_IMAGE:latest"
    - echo "Déploiement manuel en attente d'un VPS/AWS/Azure."
  environment:
    name: production
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      exists:
        - Dockerfile
      when: manual

# ==========================================
# STAGE 5: SMOKE TEST (Post-Deploy Verification)
# ==========================================
smoke-test:
  stage: smoke-test  # add this stage to your stages list too
  image: curlimages/curl:latest
  script:
    - echo "Testing live deployment..."
    - curl -f https://qr-code-j55k.onrender.com/health || exit 1
    - curl -f https://qr-code-j55k.onrender.com/ || exit 1
    - |
      curl -X POST -H "Content-Type: application/json" \
        -d '{"url":"https://gitlab.com"}' \
        https://qr-code-j55k.onrender.com/generate || exit 1
    - echo "All smoke tests passed!"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: on_success